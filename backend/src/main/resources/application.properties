# MySQL Database Connection Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root

# Env variable configuration (Uses DB_PASSWORD if set in IDE, otherwise defaults to password123)
spring.datasource.password=${DB_PASSWORD:password123}

# Hibernate Automation and Generation Engine Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate 7 strategy naming convention from main branch
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Spring Security default credentials
spring.security.user.name=admin
spring.security.user.password=admin123