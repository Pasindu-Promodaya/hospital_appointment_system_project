# MySQL Database Connection Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Uses environment variable if present, falls back to password123
spring.datasource.password=${MYSQL_PASSWORD:password123}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123

# Spring Framework SMTP Gateway Engine Configuration Properties (Notification Engine)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${HOSPITAL_EMAIL_USER:placeholder@gmail.com}
spring.mail.password=${HOSPITAL_EMAIL_PASSWORD:placeholder_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Updated Twilio WhatsApp Sandbox Gateway Configuration Settings (Notification Engine)
twilio.account.sid=${TWILIO_ACCOUNT_SID:ACplaceholder_sid}
twilio.auth.token=${TWILIO_AUTH_TOKEN:placeholder_token}
twilio.whatsapp.number=+14155238886